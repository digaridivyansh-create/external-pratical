<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
</head>
<body>
    <div class="calculator">
        <h1>Age Calculator</h1>
        <label for="dob">Select your date of birth</label>
        <input type="date" id="dob">
        <button onclick="calculateAge()">Calculate Age</button>
        <div class="result" id="result"></div>
    </div>
<script>
        function calculateAge() {
            const dobInput = document.getElementById('dob');
            const result = document.getElementById('result');

            if (!dobInput.value) {
                result.className = 'result error';
                result.textContent = 'Please select your date of birth.';
                return;
            }

            const dob = new Date(dobInput.value + 'T00:00:00');
            const today = new Date();

            if (dob > today) {
                result.className = 'result error';
                result.textContent = 'Date of birth cannot be in the future.';
                return;
            }

            let years = today.getFullYear() - dob.getFullYear();
            let months = today.getMonth() - dob.getMonth();
            let days = today.getDate() - dob.getDate();

            if (days < 0) {
                const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += previousMonth.getDate();
                months--;
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            result.className = 'result';
            result.innerHTML = `
                <div>
                    <span>${years}</span>
                    <small>Years</small>
                </div>
                <div>
                    <span>${months}</span>
                    <small>Months</small>
                </div>
                <div>
                    <span>${days}</span>
                    <small>Days</small>
                </div>
            `;
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, #eef2ff, #f5f3ff);
        }

        .calculator {
            width: min(460px, 90%);
            background: #ffffff;
            padding: 32px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(76, 81, 191, 0.15);
            text-align: center;
        }

        h1 {
            margin: 0 0 18px;
            color: #2d2d5d;
            font-size: 1.9rem;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="date"]:focus {
            border-color: #7c3aed;
        }

        button {
            margin-top: 16px;
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #7c3aed, #4f46e5);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 18px rgba(79, 70, 229, 0.25);
        }

        .result {
            margin-top: 24px;
            padding: 18px;
            background: #f8fafc;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .result div {
            min-width: 90px;
        }

        .result span {
            display: block;
            font-size: 2rem;
            font-weight: 800;
            color: #1e1b4b;
        }

        .result small {
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.75rem;
        }

        .error {
            color: #b91c1c;
            background: #fef2f2;
            font-weight: 600;
        }
    </style>


    
</body>
</html>
